name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch: # Biar bisa kita klik manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Menggunakan generator pacman resmi yang andal
      - uses: jasonlong/github-readme-pacman@main
        with:
          github_user_name: NikmalWahid22

      # Menyimpan hasilnya otomatis ke branch pacman-output
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
