name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Langkah 1: Ambil kode repositori
      - uses: actions/checkout@v3

      # Langkah 2: Generate animasi menggunakan Platane/snk (Versi resmi & aktif)
      - uses: Platane/snk@v3
        with:
          github_user_name: NikmalWahid22
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Langkah 3: Simpan hasilnya ke branch pacman-output
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
