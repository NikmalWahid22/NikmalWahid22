name: Generate arcade animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Ambil repo versi terbaru (Node 24 aman)
      - uses: actions/checkout@v4

      # Menggunakan Platane/snk dengan racikan warna Retro Arcade & Pacman Kuning
      - uses: Platane/snk@v3
        with:
          github_user_name: NikmalWahid22
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=yellow&color_dots=#161b22,#005f73,#0a9396,#94d2bd,#e9d8a6
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=yellow&color_dots=#161b22,#002f3c,#005f73,#0a9396,#94d2bd

      # Simpan aman ke branch pacman-output
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
